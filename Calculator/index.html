<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="project6.css">
</head>

<body>

  <div class="contain">
    <div>
      <input type="text" class="sreen" id="sreen" disabled>
      <p class="totalCal" id="totalCal"></p>
    </div>
    <div class="keys">
      <button class="opt" onclick="clearDisplay();">CE</button>
      <button class="opt" onclick="deleteLast();">C</button>
      <button class="opt" onclick="append('+');">+</button>
      <button class="opt" onclick="append('-');">-</button>
      <button class="num" onclick="append('7');">7</button>
      <button class="num" onclick="append('8');">8</button>
      <button class="num" onclick="append('9');">9</button>
      <button class="opt" onclick="append('*');">x</button>
      <button class="num" onclick="append('4');">4</button>
      <button class="num" onclick="append('5');">5</button>
      <button class="num" onclick="append('6');">6</button>
      <button class="opt" onclick="append('/');">/</button>
      <button class="num" onclick="append('1');">1</button>
      <button class="num" onclick="append('2');">2</button>
      <button class="num" onclick="append('3');">3</button>
      <button class="opt" onclick="append('.');">.</button>
      <button class="num" onclick="append('0');">0</button>
      <button class="result" onclick="calculate();">=</button>
    </div>
  </div>
  <script src="project6.js"></script>
</body>

</html>
